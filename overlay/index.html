<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Moikkabot Overlay</title>

<style>
  body {
    margin: 0;
    background: transparent;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;
  }

  .container {
    width: 420px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .box {
    background: rgba(0, 0, 0, 0.65);
    border: 2px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 12px 16px;
    box-sizing: border-box;
  }

  #faceit-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px 12px;
    font-size: 16px;
  }

  #faceit-container > div {
    background: rgba(255, 255, 255, 0.04);
    border-radius: 8px;
    padding: 6px 10px;
  }

  #faceit-container.faceit-positive {
    animation: greenGlow 1.5s ease-in-out infinite;
  }

  #faceit-container.faceit-negative {
    animation: redGlow 1.5s ease-in-out infinite;
  }

  #faceit-container.faceit-streak {
    animation: firePulse 0.9s ease-in-out infinite;
  }

  @keyframes greenGlow {
    0%, 100% { box-shadow: 0 0 0 rgba(60, 255, 140, 0.2); }
    50% { box-shadow: 0 0 14px rgba(60, 255, 140, 0.8); }
  }

  @keyframes redGlow {
    0%, 100% { box-shadow: 0 0 0 rgba(255, 72, 72, 0.2); }
    50% { box-shadow: 0 0 14px rgba(255, 72, 72, 0.8); }
  }

  @keyframes firePulse {
    0%, 100% { transform: scale(1); filter: saturate(1); }
    50% { transform: scale(1.02); filter: saturate(1.35); }
  }

  .title {
    font-size: 14px;
    opacity: 0.75;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }

  .value {
    font-size: 22px;
    font-weight: 600;
    text-align: center;
  }

  /* JONO SCROLL */
  .queue-box {
    overflow: hidden;
    white-space: nowrap;
  }

  .queue-scroll {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 20s linear infinite;
    font-size: 18px;
  }

  @keyframes scroll {
    from {
      transform: translateX(0);
    }
    to {
      transform: translateX(-100%);
    }
  }
</style>
</head>

<body>
  <div class="container">

    <div class="box">
      <div class="title">🎮 NYT VUOROSSA</div>
      <div class="value" id="current">-</div>
    </div>

    <div class="box">
      <div class="title">➡️ SEURAAVANA</div>
      <div class="value" id="next">-</div>
    </div>

    <div class="box queue-box">
      <div class="title">📋 JONO</div>
      <div class="queue-scroll" id="queue">Ei ketään jonossa</div>
    </div>

    <div class="box">
      <div class="title">🔥 FACEIT CS2</div>
      <div id="faceit-container">
        <div class="elo">ELO: <span id="faceit-elo">0</span></div>
        <div class="session">Session: <span id="faceit-change">0</span></div>
        <div class="wl">W/L: <span id="faceit-wl">0-0</span></div>
        <div class="streak">Streak: <span id="faceit-streak">0</span></div>
      </div>
    </div>

  </div>

<script>
  let ws = null;
  let reconnectTimer = null;

  function renderOverlay(data) {
    document.getElementById('current').textContent = data.current ?? '-';
    document.getElementById('next').textContent = data.next ?? '-';

    const queueText = Array.isArray(data.queue) && data.queue.length
      ? data.queue.map((name, index) => `${index + 1}. ${name}`).join('  •  ')
      : 'Ei ketään jonossa';

    const queueEl = document.getElementById('queue');
    queueEl.textContent = queueText;

    queueEl.style.animation = 'none';
    queueEl.offsetHeight;
    queueEl.style.animation = null;

    renderFaceit(data.faceit || null);
  }

  function renderFaceit(faceit) {
    const state = faceit || {
      currentElo: 0,
      eloChange: 0,
      wins: 0,
      losses: 0,
      streak: 0
    };

    const container = document.getElementById('faceit-container');
    const sign = state.eloChange > 0 ? '+' : '';

    document.getElementById('faceit-elo').textContent = state.currentElo;
    document.getElementById('faceit-change').textContent = `${sign}${state.eloChange}`;
    document.getElementById('faceit-wl').textContent = `${state.wins}-${state.losses}`;
    document.getElementById('faceit-streak').textContent = state.streak;

    container.classList.remove('faceit-positive', 'faceit-negative', 'faceit-streak');

    if (state.eloChange > 0) container.classList.add('faceit-positive');
    if (state.eloChange < 0) container.classList.add('faceit-negative');
    if (Math.abs(state.streak) >= 3) container.classList.add('faceit-streak');
  }

  function connectWebSocket() {
    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
      return;
    }

    ws = new WebSocket(`ws://${location.host}`);

    ws.onmessage = event => {
      const data = JSON.parse(event.data);

      if (data.type === 'faceitUpdate') {
        renderFaceit(data.data);
        return;
      }

      renderOverlay(data);
    };

    ws.onclose = () => {
      reconnectTimer = setTimeout(connectWebSocket, 1500);
    };

    ws.onerror = () => {
      ws.close();
    };
  }

  connectWebSocket();
</script>
</body>
</html>
