<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Moikkabot Overlay</title>

<style>
  body {
    margin: 0;
    background: transparent;
    font-family: 'Segoe UI', Arial, sans-serif;
    color: white;
  }

  .container {
    width: 420px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .box {
    background: rgba(0, 0, 0, 0.65);
    border: 2px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 12px 16px;
    box-sizing: border-box;
  }

  .title {
    font-size: 14px;
    opacity: 0.75;
    margin-bottom: 4px;
    letter-spacing: 1px;
  }

  .value {
    font-size: 22px;
    font-weight: 600;
    text-align: center;
  }

  /* JONO SCROLL */
  .queue-box {
    overflow: hidden;
    white-space: nowrap;
  }

  .queue-scroll {
    display: inline-block;
    padding-left: 100%;
    animation: scroll 20s linear infinite;
    font-size: 18px;
  }


  #faceit-container {
    background: rgba(0, 0, 0, 0.65);
    border: 2px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    padding: 12px 16px;
  }

  #faceit-container > div {
    margin: 4px 0;
    font-size: 16px;
  }

  #faceit-container.positive-glow {
    animation: positiveGlow 1.6s ease-in-out infinite;
  }

  #faceit-container.negative-glow {
    animation: negativeGlow 1.6s ease-in-out infinite;
  }

  #faceit-container.hot-streak {
    animation: firePulse 1.1s ease-in-out infinite;
  }

  @keyframes positiveGlow {
    0%, 100% { box-shadow: 0 0 0 rgba(46, 204, 113, 0.1); }
    50% { box-shadow: 0 0 22px rgba(46, 204, 113, 0.8); }
  }

  @keyframes negativeGlow {
    0%, 100% { box-shadow: 0 0 0 rgba(231, 76, 60, 0.1); }
    50% { box-shadow: 0 0 22px rgba(231, 76, 60, 0.8); }
  }

  @keyframes firePulse {
    0%, 100% { filter: saturate(1); transform: scale(1); }
    50% { filter: saturate(1.4) hue-rotate(-8deg); transform: scale(1.01); }
  }

  @keyframes scroll {
    from {
      transform: translateX(0);
    }
    to {
      transform: translateX(-100%);
    }
  }
</style>
</head>

<body>
  <div class="container">

    <div class="box">
      <div class="title">🎮 NYT VUOROSSA</div>
      <div class="value" id="current">-</div>
    </div>

    <div class="box">
      <div class="title">➡️ SEURAAVANA</div>
      <div class="value" id="next">-</div>
    </div>

    <div class="box queue-box">
      <div class="title">📋 JONO</div>
      <div class="queue-scroll" id="queue">Ei ketään jonossa</div>
    </div>

    <div id="faceit-container" class="box">
      <div class="elo">ELO: <span id="faceit-elo">0</span></div>
      <div class="session">Session: <span id="faceit-change">+0</span></div>
      <div class="wl">W/L: <span id="faceit-wl">0-0</span></div>
      <div class="streak">Streak: <span id="faceit-streak">0</span></div>
    </div>


  </div>

<script>
  let ws = null;
  let reconnectTimer = null;

  function renderFaceit(faceitData = {}) {
    const currentElo = Number(faceitData.currentElo || 0);
    const eloChange = Number(faceitData.eloChange || 0);
    const wins = Number(faceitData.wins || 0);
    const losses = Number(faceitData.losses || 0);
    const streak = Number(faceitData.streak || 0);

    document.getElementById('faceit-elo').textContent = currentElo;
    document.getElementById('faceit-change').textContent = `${eloChange >= 0 ? '+' : ''}${eloChange}`;
    document.getElementById('faceit-wl').textContent = `${wins}-${losses}`;
    document.getElementById('faceit-streak').textContent = streak;

    const container = document.getElementById('faceit-container');
    container.classList.toggle('positive-glow', eloChange > 0);
    container.classList.toggle('negative-glow', eloChange < 0);
    container.classList.toggle('hot-streak', streak >= 3);
  }

  function renderOverlay(data) {
    document.getElementById('current').textContent = data.current ?? '-';
    document.getElementById('next').textContent = data.next ?? '-';

    const queueText = Array.isArray(data.queue) && data.queue.length
      ? data.queue.map((name, index) => `${index + 1}. ${name}`).join('  •  ')
      : 'Ei ketään jonossa';

    const queueEl = document.getElementById('queue');
    queueEl.textContent = queueText;

    queueEl.style.animation = 'none';
    queueEl.offsetHeight;
    queueEl.style.animation = null;
  }

  function connectWebSocket() {
    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
      return;
    }

    ws = new WebSocket(`ws://${location.host}`);

    ws.onmessage = event => {
      const payload = JSON.parse(event.data);

      if (payload.type === 'faceitUpdate') {
        renderFaceit(payload.data || {});
        return;
      }

      renderOverlay(payload);
      if (payload.faceit) {
        renderFaceit(payload.faceit);
      }
    };

    ws.onclose = () => {
      reconnectTimer = setTimeout(connectWebSocket, 1500);
    };

    ws.onerror = () => {
      ws.close();
    };
  }

  renderFaceit();
  connectWebSocket();
</script>
</body>
</html>
